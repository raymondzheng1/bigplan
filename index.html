  const deep = tracked.filter(t => t.timeSpent >= 3600);
  const mid = tracked.filter(t => t.timeSpent >= 900 && t.timeSpent < 3600);
  const shallow = tracked.filter(t => t.timeSpent < 900);
  const coverage = Math.round(tracked.length / done.length * 100);

  const wd = [0, 0, 0, 0, 0, 0, 0];
  done.forEach(t => wd[new Date(t.doneAt).getDay()]++);
  const wdNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const buckets = { 'Morning 5–12': 0, 'Afternoon 12–17': 0, 'Evening 17–22': 0, 'Night 22–5': 0 };
  done.forEach(t => { const h = new Date(t.doneAt).getHours();
    if (h >= 5 && h < 12) buckets['Morning 5–12']++;
    else if (h >= 12 && h < 17) buckets['Afternoon 12–17']++;
    else if (h >= 17 && h < 22) buckets['Evening 17–22']++;
    else buckets['Night 22–5']++; });

  const aging = open.map(t => ({ t, days: Math.floor((Date.now() - (t.createdAt || Date.now())) / 864e5) }))
    .sort((a, b) => b.days - a.days).slice(0, 5);
  const cats = autoCategories();
  const zeroTimeCats = cats.filter(c => c.name !== 'other' && c.time === 0 && (c.total - c.done) > 1);

  el.innerHTML =
    icard('Mission pace',
      `<div class="irow"><b>${done.length}</b> completed · <b>${(done.length / Math.max(missionDayN, 1)).toFixed(1)}</b>/day average · active on <b>${activeDays}</b> of ${missionDayN} mission days</div>` +
      `<div class="irow">This week <b>${wk}</b> vs last week <b>${wkPrev}</b>${trend !== null ? ` (<b>${trend >= 0 ? '+' : ''}${trend}%</b>)` : ''} · median added→done: <b>${median < 1 ? 'same day' : Math.round(median) + ' day' + (Math.round(median) > 1 ? 's' : '')}</b></div>` +
      (() => { const al = alignment7d(); const wkR = weekKey(); const rocks = tasks.filter(t => t.rockWeek === wkR);
        return `<div class="irow">Mission time (7d): <b>${al !== null ? al + '%' : '—'}</b> · rocks this week: <b>${rocks.length ? rocks.filter(t => t.done).length + '/' + rocks.length : 'none set'}</b></div>`; })())
    + icard('Projects — detected automatically',
      bars(cats.slice(0, 7).map(c => ({
        label: c.name === 'other' ? 'Other' : c.name.toUpperCase(),
        value: c.time || c.total * 60,
        disp: (c.time ? fmtDurLabel(c.time) + ' · ' : '') + c.done + '/' + c.total + ' done'
      })))
      + (zeroTimeCats.length ? `<div class="hint" style="margin-top:8px">⚠ ${zeroTimeCats.map(c => c.name.toUpperCase()).join(', ')} ha${zeroTimeCats.length > 1 ? 've' : 's'} open tasks but zero tracked time — starving project${zeroTimeCats.length > 1 ? 's' : ''}?</div>` : '')
      + '<div class="hint" style="margin-top:6px">Grouped by recurring words in your task names — no tagging needed.</div>')
    + (() => {                          // completions by context queue (nab/work/vu = your categories)
        const qg = {};
        done.forEach(t => { const q = t.queueName || 'To Do'; (qg[q] = qg[q] || { n: 0, s: 0 }); qg[q].n++; qg[q].s += t.timeSpent || 0; });
        const rows = Object.entries(qg).sort((a, b) => b[1].n - a[1].n);
        return rows.length < 2 ? '' : icard('By queue',
          bars(rows.map(([q, v]) => ({ label: q, value: v.s || v.n * 60, disp: v.n + ' done' + (v.s ? ' · ' + fmtDurLabel(v.s) : '') })))
          + '<div class="hint" style="margin-top:6px">Where completions came from — your queues are your contexts.</div>');
      })()
    + (() => {                          // rituals (repeating tasks) with live streaks
        const rits = tasks.filter(t => !t.done && t.repeat);
        return !rits.length ? '' : icard('Rituals',
          rits.map(t => `<div class="irow">🔁 ${esc(t.text.slice(0, 54))} — ${liveStreak(t) ? '<b>🔥 ' + liveStreak(t) + '</b> streak' : 'streak broken — restart today'}</div>`).join(''));
      })()
    + icard('Work depth',
      bars([
        { label: 'Deep (>1h)', value: sum(deep), disp: fmtDurLabel(sum(deep)) + ' · ' + deep.length },
        { label: 'Medium', value: sum(mid), disp: fmtDurLabel(sum(mid)) + ' · ' + mid.length },
        { label: 'Quick (<15m)', value: sum(shallow), disp: fmtDurLabel(sum(shallow)) + ' · ' + shallow.length }
      ])
      + `<div class="hint" style="margin-top:8px">Time tracked on ${coverage}% of completed tasks (${tracked.length}/${done.length})${coverage < 60 ? ' — track more via work mode for sharper insights' : ''}.` +
      (shallow.length >= 4 ? ` You have ${shallow.length} quick tasks — batching them into one admin block protects your deep-work hours.` : '') + '</div>')
    + icard('Rhythm',
      '<div class="isub">Completions by weekday</div>' + bars(wdNames.map((nm, i) => ({ label: nm, value: wd[i] })))
      + '<div class="isub" style="margin-top:12px">By time of day</div>' + bars(Object.entries(buckets).map(([k, v]) => ({ label: k, value: v }))))
    + icard('Needs attention',
      (aging.length ? aging.map(a => `<div class="irow">• ${esc(a.t.text.slice(0, 64))}${a.t.text.length > 64 ? '…' : ''} <span class="hint">— ${a.days <= 0 ? 'added today' : a.days + 'd old'}</span></div>`).join('') : '<div class="hint">Nothing aging. Clean board!</div>')
      + (open.length > 12 ? `<div class="hint" style="margin-top:8px">${open.length} open items in total — a weekly prune of the oldest keeps the board honest.</div>` : ''));
}

/* ============ mission strategy: goal, milestones, alignment, weekly rocks ============ */
function weekKey() {
  const d = new Date(); const off = (d.getDay() + 6) % 7;   // Monday-based week
  const m = new Date(d.getFullYear(), d.getMonth(), d.getDate() - off);
  return m.getFullYear() + '-' + String(m.getMonth() + 1).padStart(2, '0') + '-' + String(m.getDate()).padStart(2, '0');
}
function missionKeywords() {
  return (mission.keywords || []).map(k => ALIASES[k] || k).filter(Boolean);
}
function alignment7d() {                 // share of tracked time (last 7 days) on mission-keyword tasks
  const cutoff = Date.now() - 7 * 864e5;
  const kws = missionKeywords();
  if (!kws.length) return null;
  let missionSecs = 0, total = 0;
  tasks.forEach(t => {
    let secs = 0;
    if (t.sessions && t.sessions.length) t.sessions.forEach(([s, d]) => { if (s >= cutoff) secs += d; });
    else if (t.timeSpent && t.done && t.doneAt >= cutoff) secs = t.timeSpent;
    if (!secs) return;
    total += secs;
    const tk = tokensOf(t.text);
    if (kws.some(k => tk.includes(k))) missionSecs += secs;
  });
  return total >= 600 ? Math.round(missionSecs / total * 100) : null; // need ≥10 min tracked to be meaningful
}
function renderMission() {
  const g = $('m-goal');
  if (mission.goal) { g.textContent = mission.goal; g.style.display = 'block'; } else g.style.display = 'none';
  const start = new Date(2026, 6, 1).getTime(), end = new Date(2027, 5, 30).getTime(), today = Date.now();
  const marks = $('m-marks'); marks.innerHTML = '';
  (mission.milestones || []).forEach(m => {
    if (!m.date) return;
    const ts = new Date(m.date + 'T12:00').getTime();
    const pct = Math.max(0.5, Math.min(99.5, (ts - start) / (end - start) * 100));
    const dot = document.createElement('div');
    dot.className = 'm-mark' + (m.done ? ' hit' : (ts < today ? ' late' : ''));
    dot.style.left = pct + '%';
    dot.title = m.name + ' · ' + m.date + (m.done ? ' ✓' : '');
    marks.appendChild(dot);
  });
  const undone = (mission.milestones || []).filter(m => !m.done && m.date).sort((a, b) => a.date < b.date ? -1 : 1);
  let line;
  if (undone.length) {
    const d = Math.ceil((new Date(undone[0].date + 'T12:00') - today) / 864e5);
    line = d < 0 ? '⚠ Overdue: ' + undone[0].name + ' (' + (-d) + 'd)' : 'Next: ' + undone[0].name + ' · ' + d + 'd';
  } else if ((mission.milestones || []).length) line = 'All milestones achieved 🎉';
  else line = 'Tap to set your goal & milestones';
  const al = alignment7d();
  $('m-next').textContent = line + (al !== null ? '   ·   Mission time ' + al + '% (7d)' : '');
}
function openMission() {
  $('m-goal-in').value = mission.goal || '';
  $('m-kw-in').value = (mission.keywords || []).join(', ');
  const list = $('m-list'); list.innerHTML = '';
  (mission.milestones || []).forEach(m => list.appendChild(msRow(m)));
  $('missiondlg').classList.add('on');
}
function msRow(m) {
  const row = document.createElement('div'); row.className = 'mrow';
  const ck = document.createElement('input'); ck.type = 'checkbox'; ck.checked = !!m.done; ck.title = 'Achieved';
  const nm = document.createElement('input'); nm.type = 'text'; nm.className = 'ms-name'; nm.placeholder = 'Milestone'; nm.value = m.name || '';
  const dt = document.createElement('input'); dt.type = 'date'; dt.className = 'ms-date'; dt.value = m.date || '';
  const rm = document.createElement('button'); rm.className = 'x'; rm.textContent = '✕';
  rm.onclick = () => row.remove();
  row.append(ck, nm, dt, rm);
  return row;
}
function addMilestoneRow() {
  if ($('m-list').children.length >= 5) { alert('Five milestones max — keep it strategic.'); return; }
  $('m-list').appendChild(msRow({}));
}
function saveMission() {
  const ms = Array.from($('m-list').children).map(r => ({
    done: r.querySelector('input[type=checkbox]').checked,
    name: r.querySelector('.ms-name').value.trim(),
    date: r.querySelector('.ms-date').value
  })).filter(m => m.name);
  ms.sort((a, b) => (a.date || '9999') < (b.date || '9999') ? -1 : 1);
  mission = {
    goal: $('m-goal-in').value.trim(),
    keywords: $('m-kw-in').value.split(',').map(s => norm(s).split(' ')[0]).filter(Boolean),
    milestones: ms
  };
  store('tk_mission', mission);
  renderMission();
  $('missiondlg').classList.remove('on');
  toast('Mission updated');
}
/* task editing */
let editTask = null;
function openEdit(t) {
  editTask = t;
  $('edit-text').value = t.text;
  $('edit-note').value = t.note || '';
  $('edit-repeat').value = t.repeat || '';
  $('editdlg').classList.add('on');
  $('edit-text').focus();
}
function saveEdit() {
  if (!editTask) return;
  const v = $('edit-text').value.trim();
  if (!v) { alert('Task text cannot be empty.'); return; }
  editTask.text = v;
  const note = $('edit-note').value.trim();
  if (note) editTask.note = note; else delete editTask.note;
  const rep = $('edit-repeat').value;
  if (rep) editTask.repeat = rep;
  else { delete editTask.repeat; delete editTask.streak; delete editTask.lastDoneDay; }
  editTask.editedAt = Date.now();
  $('editdlg').classList.remove('on');
  editTask = null;
  saveAll();
  toast('Task updated');
}

/* rituals: repeating tasks that respawn on completion and build streaks */
function dayGap(d1, d2) { return Math.round((new Date(d2 + 'T12:00') - new Date(d1 + 'T12:00')) / 864e5); }
function streakContinues(repeat, lastDay, today) {
  if (!lastDay) return false;
  const g = dayGap(lastDay, today);
  if (repeat === 'daily') return g === 1;
  if (repeat === 'weekly') return g >= 1 && g <= 7;
  if (repeat === 'weekdays') {
    if (g === 1) return true;
    return new Date(today + 'T12:00').getDay() === 1 && g <= 3;  // Monday after Friday
  }
  return false;
}
function liveStreak(t) {
  if (!t.repeat || !t.streak) return 0;
  const today = todayKey();
  return (t.lastDoneDay === today || streakContinues(t.repeat, t.lastDoneDay, today)) ? t.streak : 0;
}
function respawnRepeat(t) {
  const today = todayKey();
  let ns;
  if (t.lastDoneDay === today) ns = t.streak || 1;                       // second completion same day
  else if (streakContinues(t.repeat, t.lastDoneDay, today)) ns = (t.streak || 0) + 1;
  else ns = 1;
  t.streakAtDone = ns;                                                    // frozen on the done card
  const next = {
    id: uid(), text: t.text, done: false, files: [], createdAt: Date.now(),
    col: (t.prevCol && cols.some(c => c.id === t.prevCol)) ? t.prevCol : cols[0].id,
    repeat: t.repeat, streak: ns, lastDoneDay: today,
    src: 'repeat', createdDevice: devTag(), touchedAt: Date.now()
  };
  if (t.note) next.note = t.note;
  tasks.push(next);
  if (ns > 1 && ns % 7 === 0) celebrate('🔥', ns + '-day streak!', '“' + t.text.slice(0, 40) + '” — unbroken. Protect it.');
  else toast('🔁 Logged · 🔥 streak ' + ns + ' · next one queued');
}

function toggleRock(t) {
  const wk = weekKey();
  if (t.rockWeek === wk) { delete t.rockWeek; touch(t); saveAll(); return; }
  if (tasks.filter(x => x.rockWeek === wk).length >= 3) {
    alert('Three rocks max per week — that’s the point. Unstar one first.');
    return;
  }
  t.rockWeek = wk;
  touch(t);
  saveAll(); toast('Rock set for this week 🪨');
}

/* ============ habits ============ */
let habits = []; // loaded in initState()
function last7() {
  const out = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); out.push(d); }
  return out;
}
function streak(h) {
  let s = 0; const d = new Date();
  if (!h.days[todayKey()]) d.setDate(d.getDate() - 1);
  while (h.days[dkey(new Date(d.getTime() - d.getTimezoneOffset()*60000))]) { s++; d.setDate(d.getDate() - 1); }
  return s;
}
function renderHabits() {
  const t = $('ht');
  const days = last7();
  let html = '<tr><th>Habit</th>' + days.map(d => {
    const isT = dkey(new Date(d.getTime() - d.getTimezoneOffset()*60000)) === todayKey();
    return `<th class="${isT ? 'today-col' : ''}">${d.toLocaleDateString(undefined,{weekday:'short'})}</th>`;
  }).join('') + '<th></th></tr>';
  habits.forEach((h, hi) => {
    html += `<tr><td>${h.name}<span class="streak">🔥 ${streak(h)}</span></td>`;
    days.forEach(d => {
      const k = dkey(new Date(d.getTime() - d.getTimezoneOffset()*60000));
      html += `<td><span class="dot ${h.days[k] ? 'hit' : ''}" onclick="tick(${hi},'${k}')"></span></td>`;
    });
    html += `<td><button class="x" onclick="delHabit(${hi})">✕</button></td></tr>`;
  });
  t.innerHTML = html;
}
function tick(hi, k) {
  habits[hi].days[k] = !habits[hi].days[k];
  if (!habits[hi].days[k]) delete habits[hi].days[k];
  else { const s = streak(habits[hi]); if (s > 0 && s % 7 === 0) { celebrate('🔥', s + '-day streak!', '"' + habits[hi].name + '" — a full ' + (s/7) + ' week' + (s>7?'s':'') + ' unbroken. Protect it.'); } }
  store('tk_habits', habits); renderHabits();
}
function delHabit(hi) { habits.splice(hi, 1); store('tk_habits', habits); renderHabits(); }
function addHabit() {
  const v = $('hi').value.trim(); if (!v) return;
  habits.push({ name: v, days: {} }); $('hi').value = '';
  store('tk_habits', habits); renderHabits();
}
/* (Habits tab retired — rituals now live as repeating tasks; legacy functions dormant) */

/* ============ focus timer ============ */
let durs = { focus: 25, break: 5 };   // loaded in initState()
let mode = 'focus', left = 25 * 60, ticking = null;
const RING_C = 2 * Math.PI * 128;

function durChanged() {
  const f = Math.max(1, Math.min(180, parseInt($('focusMin').value) || 25));
  const b = Math.max(1, Math.min(60, parseInt($('breakMin').value) || 5));
  durs = { focus: f, break: b };
  $('focusMin').value = f; $('breakMin').value = b;
  store('tk_dur', durs);
  if (!ticking) { left = durs[mode] * 60; paint(); }
}
function fmt(s) { return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0'); }
function paint() {
  $('clock').textContent = fmt(left);
  $('mode').textContent = mode === 'focus' ? `Focus · ${durs.focus} min` : `Break · ${durs.break} min`;
  const total = durs[mode] * 60;
  $('ring').style.strokeDashoffset = RING_C * (1 - left / total);
  document.title = ticking ? fmt(left) + (mode === 'focus' ? ' · Focus' : ' · Break') : 'BigPlan';
  const done = load('tk_pomo_' + todayKey(), 0);
  $('sessions').textContent = done ? `${done} focus session${done > 1 ? 's' : ''} completed today` : '';
}
function toggleTimer() {
  stopAlarm();
  if (ticking) { clearInterval(ticking); ticking = null; $('startbtn').textContent = 'Resume'; return; }
  $('startbtn').textContent = 'Pause';
  ticking = setInterval(() => {
    left--;
    if (left <= 0) {
      clearInterval(ticking); ticking = null;
      startAlarm();
      if (mode === 'focus') {
        const n = load('tk_pomo_' + todayKey(), 0) + 1;
        store('tk_pomo_' + todayKey(), n);
        if (n === 4) setTimeout(() => celebrate('🧠', '4 focus sessions today', 'That’s deep-work territory. Your future self says thanks.'), 400);
      }
      mode = mode === 'focus' ? 'break' : 'focus';
      left = durs[mode] * 60; $('startbtn').textContent = 'Start';
    }
    paint();
  }, 1000);
  paint();
}
function resetTimer() { stopAlarm(); clearInterval(ticking); ticking = null; left = durs[mode] * 60; $('startbtn').textContent = 'Start'; paint(); }
function switchMode() { stopAlarm(); clearInterval(ticking); ticking = null; mode = mode === 'focus' ? 'break' : 'focus'; left = durs[mode] * 60; $('startbtn').textContent = 'Start'; paint(); }

/* alarm: slow → fast, max at 30 s, auto-stop 90 s */
let alarmCtx = null, alarmTO = null, alarmStart = 0;
function startAlarm() {
  stopAlarm();
  try { alarmCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; }
  alarmStart = Date.now();
  $('stopalarm').style.display = 'inline-block';
  alarmBeep();
}
function alarmBeep() {
  if (!alarmCtx) return;
  const el = (Date.now() - alarmStart) / 1000;
  if (el > 90) { stopAlarm(); return; }
  try {
    const o = alarmCtx.createOscillator(), g = alarmCtx.createGain();
    o.connect(g); g.connect(alarmCtx.destination);
    o.type = 'square';
    o.frequency.value = el >= 30 ? 1100 : 880;
    g.gain.setValueAtTime(0.5, alarmCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, alarmCtx.currentTime + 0.22);
    o.start(); o.stop(alarmCtx.currentTime + 0.25);
  } catch {}
  const gap = el >= 30 ? 150 : Math.round(1200 - (1050 * el / 30));
  alarmTO = setTimeout(alarmBeep, gap);
}
function stopAlarm() {
  clearTimeout(alarmTO); alarmTO = null;
  if (alarmCtx) { try { alarmCtx.close(); } catch {} alarmCtx = null; }
  $('stopalarm').style.display = 'none';
}

/* ============ notes ============ */
let saveT;
$('notes').addEventListener('input', () => {
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    store('tk_notes', $('notes').value);
    $('saved').textContent = 'Saved ' + new Date().toLocaleTimeString();
  }, 400);
});

/* ============ boot (runs after unlock) ============ */
let booted = false;
function initAndRender() {
  initState();          // read state from localStorage only AFTER the cloud pull
  renderBoard();
  if (document.activeElement !== $('notes')) $('notes').value = load('tk_notes', '');
}
function refreshUI() {  // apply freshly-synced data IN PLACE — never reload mid-session
  if (!booted) return;
  const wtId = workTask && workTask.id, edId = editTask && editTask.id;
  initAndRender();
  if (wtId) {           // re-bind the live timer's task to the fresh array
    const f = tasks.find(x => x.id === wtId);
    if (f) workTask = f;
    else if (workTask) tasks.push(workTask);  // deleted remotely while being timed → keep it alive here
  }
  if (edId) { const f = tasks.find(x => x.id === edId); if (f) editTask = f; }
  renderMission();
}
function recoverWorkLive() {            // a reload/app-update can no longer lose tracked time
  const live = load('tk_worklive', null);
  if (!live || !live.id) return;
  localStorage.removeItem('tk_worklive');
  const t = tasks.find(x => x.id === live.id);
  if (!t || !live.elapsed) return;
  if (live.elapsed > (t.timeSpent || 0)) { t.timeSpent = live.elapsed; touch(t); saveAll(); }
  toast('Recovered ' + fmtDurLabel(live.elapsed) + ' tracked on “' + t.text.slice(0, 32) + (t.text.length > 32 ? '…' : '') + '”');
  openWork(t);
}
function boot() {
  if (booted) return; booted = true;
  usageBump('o');       // daily open count (engagement rhythm for insights)
  initAndRender();
  recoverWorkLive();
  dailyMoment();
  if (localStorage.getItem('tk_dirty') === 'true') syncPush();
}
function dailyMoment() {                // first open of the day → Day-N splash; Mondays → last-week recap
  const u = load('tk_usage', {})[todayKey()];
  if (!u || u.o !== 1) return;
  $('spDay').textContent = 'Day ' + missionDayN;
  $('spQuote').textContent = $('quote').textContent || '';
  const s = $('splash');
  s.classList.add('on');
  setTimeout(() => s.classList.remove('on'), 2400);
  if (new Date().getDay() === 1) {
    const seen = load('tk_mil', {});
    if (!seen['recap' + weekKey()]) {
      seen['recap' + weekKey()] = true; store('tk_mil', seen);
      const dn = tasks.filter(t => t.done && t.doneAt >= Date.now() - 7 * 864e5);
      const tm = dn.reduce((s2, t) => s2 + (t.timeSpent || 0), 0);
      if (dn.length) setTimeout(() => celebrate('🏁', 'New week, Raymond',
        'Last week: ' + dn.length + ' shipped' + (tm ? ' · ' + fmtDurLabel(tm) + ' tracked' : '') +
        '. Pick your 3 rocks and go again.'), 2700);
    }
  }
}

/* ============ PWA: offline service worker ============ */
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
