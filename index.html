<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="BigPlan — Raymond's one-year mission command center. Tasks, habits, focus, notes. Works offline.">
<meta name="theme-color" content="#0b0b0f">
<title>BigPlan</title>
<link rel="manifest" href="manifest.webmanifest">
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-icon.png">
<style>
  :root { color-scheme: light;
    --bg:#fbfbfd; --ink:#1d1d1f; --sub:#86868b; --hair:rgba(60,60,67,.12);
    --blue:#0071e3; --blue-h:#0077ed; --tint:rgba(0,113,227,.09);
    --grad:linear-gradient(135deg,#0a84ff,#bf5af2);
    --card:rgba(255,255,255,.72);
    --spring:cubic-bezier(.34,1.4,.64,1);
  }
  * { box-sizing:border-box; margin:0; }
  body {
    background:var(--bg); color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Inter,sans-serif;
    padding:max(44px, calc(24px + env(safe-area-inset-top))) 22px calc(60px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body::before, body::after {
    content:''; position:fixed; z-index:-1; border-radius:50%; filter:blur(90px); opacity:.5;
    animation:drift 26s ease-in-out infinite alternate;
  }
  body::before { width:560px; height:560px; top:-220px; left:-140px;
    background:radial-gradient(circle,#b8d4ff 0%,transparent 65%); }
  body::after  { width:640px; height:640px; bottom:-280px; right:-180px;
    background:radial-gradient(circle,#e4ccff 0%,#ffe1c2 55%,transparent 75%); animation-delay:-13s; }
  @keyframes drift { from { transform:translate(0,0) scale(1); } to { transform:translate(70px,50px) scale(1.15); } }

  .wrap { max-width:880px; margin:0 auto; transition:filter .3s; }
  .wrap.blurred { filter:blur(16px) saturate(.8); pointer-events:none; user-select:none; }

  header { margin-bottom:20px; display:flex; justify-content:space-between; align-items:flex-end; gap:14px; flex-wrap:wrap; }
  .greet { font-size:34px; font-weight:700; letter-spacing:-.022em; line-height:1.15; }
  .greet em { font-style:normal; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #today { color:var(--sub); font-size:15px; margin-top:4px; letter-spacing:-.01em; }
  .hbtns { display:flex; gap:8px; }
  .ghost { border:none; background:rgba(120,120,128,.12); color:var(--ink);
    padding:8px 16px; border-radius:980px; cursor:pointer; font-size:13px; font-weight:500; transition:background .2s; }
  .ghost:hover { background:rgba(120,120,128,.2); }

  /* mission countdown */
  .mission { position:relative; border-radius:22px; padding:22px 26px; margin-bottom:22px; overflow:hidden;
    background:linear-gradient(120deg,#0b0b0f 0%,#1c1430 55%,#2a1a3f 100%); color:#fff;
    box-shadow:0 16px 48px rgba(40,20,80,.25); }
  .mission::before { content:''; position:absolute; inset:0;
    background:radial-gradient(600px 180px at 80% -40%, rgba(120,80,255,.5), transparent 70%),
               radial-gradient(400px 140px at 10% 130%, rgba(10,132,255,.35), transparent 70%); }
  .mission > * { position:relative; }
  .m-label { font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.55); }
  .m-row { display:flex; justify-content:space-between; align-items:baseline; margin-top:10px; gap:12px; flex-wrap:wrap; }
  .m-big { font-size:40px; font-weight:700; letter-spacing:-.03em; line-height:1;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; }
  .m-big small { font-size:15px; font-weight:500; color:rgba(255,255,255,.55); letter-spacing:-.01em; margin-left:6px; }
  .m-right { text-align:right; }
  .m-bar { margin-top:16px; height:6px; border-radius:99px; background:rgba(255,255,255,.14); overflow:hidden; }
  .m-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#0a84ff,#bf5af2,#ff9f0a);
    box-shadow:0 0 12px rgba(150,100,255,.8); transition:width 1s var(--spring); }
  .m-foot { display:flex; justify-content:space-between; gap:16px; margin-top:8px; font-size:12px; color:rgba(255,255,255,.5); }
  .mission { cursor:pointer; }
  .m-goal { font-size:15px; font-weight:600; color:#fff; margin-top:8px; letter-spacing:-.01em; }
  #m-marks { position:absolute; inset:0; pointer-events:none; }
  .m-mark { position:absolute; top:50%; transform:translate(-50%,-50%); width:11px; height:11px;
    border-radius:50%; background:rgba(255,255,255,.92); border:2px solid #1c1430; }
  .m-mark.hit { background:#30d158; }
  .m-mark.late { background:#ff453a; }
  .m-next { margin-top:10px; font-size:12.5px; font-weight:600; color:rgba(255,255,255,.75); letter-spacing:-.01em; }
  /* mission dialog fields */
  .mlab { display:block; font-size:11.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
    color:var(--sub); margin:14px 0 6px; }
  .mfield { width:100%; border:none; border-radius:11px; padding:10px 12px; font:14px/1.5 inherit;
    background:rgba(120,120,128,.1); resize:vertical; }
  .mfield:focus { outline:none; background:#fff; box-shadow:0 0 0 3px var(--tint); }
  .mrow { display:flex; gap:6px; align-items:center; margin:6px 0; }
  .mrow input[type=checkbox] { width:17px; height:17px; accent-color:var(--good); flex-shrink:0; }
  .mrow .ms-name { flex:1; min-width:0; border:none; border-radius:9px; padding:8px 10px; font-size:13.5px; background:rgba(120,120,128,.1); }
  .mrow .ms-date { border:none; border-radius:9px; padding:7px 8px; font-size:12.5px; background:rgba(120,120,128,.1); width:128px; }
  .mrow .x { opacity:1; }
  /* rocks */
  .taskcard.rock { box-shadow:inset 3px 0 0 0 #ffb800, 0 1px 3px rgba(0,0,0,.08), 0 0 1px rgba(0,0,0,.05); }
  .rockbtn.on { color:#ffb800 !important; opacity:1 !important; }
  #quote { text-align:right; font-style:italic; }

  /* segmented control */
  .seg { position:relative; display:flex; background:rgba(120,120,128,.12); border-radius:12px; padding:2px; margin-bottom:24px; }
  .seg .thumb { position:absolute; top:2px; left:2px; height:calc(100% - 4px); width:calc(33.333% - 2px);
    background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.12), 0 0 1px rgba(0,0,0,.08);
    transition:transform .35s var(--spring); }
  .seg button { position:relative; z-index:1; flex:1; border:none; background:none; padding:9px 0;
    font-size:14px; font-weight:500; color:var(--ink); cursor:pointer; letter-spacing:-.01em; opacity:.55; transition:opacity .2s; }
  .seg button.on { opacity:1; font-weight:600; }

  .card { background:var(--card); backdrop-filter:blur(28px) saturate(180%); -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(0,0,0,.05); border-radius:24px; padding:26px;
    box-shadow:0 10px 44px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04); }
  .pane { display:none; } .pane.on { display:block; animation:rise .35s var(--spring); }
  @keyframes rise { from { opacity:0; transform:translateY(10px) scale(.995); } to { opacity:1; transform:none; } }

  .addrow { display:flex; gap:10px; margin-bottom:16px; }
  .addrow input { flex:1; min-width:0; border:none; border-radius:14px; padding:13px 16px; font-size:15px;
    background:rgba(120,120,128,.10); transition:box-shadow .2s, background .2s; letter-spacing:-.01em; }
  .addrow input::placeholder { color:var(--sub); }
  .addrow input:focus { outline:none; background:#fff; box-shadow:0 0 0 4px var(--tint), 0 1px 4px rgba(0,0,0,.06); }
  .addrow button { border:none; background:var(--blue); color:#fff; border-radius:980px;
    padding:0 24px; cursor:pointer; font-size:14.5px; font-weight:500; transition:background .2s, transform .15s; }
  .addrow button:hover { background:var(--blue-h); }
  .addrow button:active { transform:scale(.96); }
  .addrow button.filebtn { background:rgba(120,120,128,.12); color:var(--ink); font-size:17px; padding:0 16px; }
  .addrow button.filebtn:hover { background:rgba(120,120,128,.2); }
  .addrow button.filebtn.rec { background:rgba(255,59,48,.18); box-shadow:0 0 0 3px rgba(255,59,48,.25);
    animation:recpulse .9s ease-in-out infinite alternate; }
  #newcol { border:none; background:rgba(120,120,128,.10); border-radius:11px; padding:0 10px;
    font-size:13px; font-weight:500; color:var(--ink); max-width:140px; cursor:pointer; }
  #newcol:focus { outline:none; background:#fff; box-shadow:0 0 0 3px var(--tint); }
  @keyframes recpulse { from { box-shadow:0 0 0 2px rgba(255,59,48,.2); } to { box-shadow:0 0 0 5px rgba(255,59,48,.35); } }

  /* kanban board */
  .board { display:flex; gap:14px; overflow-x:auto; padding:4px 2px 12px; align-items:flex-start; }
  .col { flex:1 1 260px; min-width:236px; background:rgba(120,120,128,.08); border-radius:18px; padding:10px; transition:background .2s; }
  .col.dragover-col { background:var(--tint); }
  .colhead { display:flex; align-items:center; gap:6px; padding:4px 8px 10px; }
  .colname { font-size:13px; font-weight:600; letter-spacing:-.01em; flex:1; cursor:pointer; }
  .colname:hover { color:var(--blue); }
  .colcount { color:var(--sub); font-size:12px; font-weight:500; }
  .colbody { list-style:none; min-height:36px; display:flex; flex-direction:column; gap:8px; }
  .taskcard { background:#fff; border-radius:13px; padding:11px 12px;
    box-shadow:0 1px 3px rgba(0,0,0,.08), 0 0 1px rgba(0,0,0,.05); cursor:grab; transition:box-shadow .18s, transform .18s; }
  .taskcard:hover { box-shadow:0 4px 14px rgba(0,0,0,.12); transform:translateY(-1px); }
  .taskcard.dragging { opacity:.4; transform:rotate(1.5deg) scale(1.03); }
  .taskcard.insert-above { box-shadow:0 -4px 0 -1px var(--blue), 0 1px 3px rgba(0,0,0,.08); }
  .taskcard.insert-below { box-shadow:0 4px 0 -1px var(--blue), 0 1px 3px rgba(0,0,0,.08); }
  .taskcard.dragover-file { outline:2px dashed var(--blue); outline-offset:-2px; background:var(--tint); }
  .trow-main { display:flex; align-items:flex-start; gap:10px; }
  .ck { position:relative; width:20px; height:20px; flex-shrink:0; cursor:pointer; margin-top:1px; }
  .ck input { position:absolute; opacity:0; inset:0; cursor:pointer; }
  .ck .box { position:absolute; inset:0; border-radius:50%; border:1.5px solid #c7c7cc; background:#fff;
    transition:all .25s var(--spring); display:flex; align-items:center; justify-content:center; }
  .ck .box::after { content:''; width:9px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff;
    transform:rotate(-45deg) scale(0); transition:transform .25s var(--spring); margin-top:-2px; }
  .ck input:checked + .box { background:var(--grad); border-color:transparent; }
  .ck input:checked + .box::after { transform:rotate(-45deg) scale(1); }
  .taskcard .t { flex:1; font-size:13.5px; line-height:1.45; letter-spacing:-.01em; word-break:break-word;
    display:-webkit-box; -webkit-line-clamp:6; -webkit-box-orient:vertical; overflow:hidden; }
  .taskcard.done .t { color:#c7c7cc; text-decoration:line-through; text-decoration-color:rgba(60,60,67,.25); }
  .x { background:none; border:none; color:#c7c7cc; cursor:pointer; font-size:13px; padding:2px 5px;
    border-radius:7px; opacity:.5; transition:all .18s; flex-shrink:0; }
  .taskcard:hover .x, .chip .x { opacity:1; }
  .x:hover { color:#ff3b30; background:rgba(255,59,48,.08); }
  .x.up:hover { color:var(--blue); background:var(--tint); }
  .colhead .x { opacity:0; }
  .col:hover .colhead .x { opacity:1; }
  .addcol { flex:0 0 auto; border:1.5px dashed rgba(60,60,67,.2); background:none; border-radius:18px;
    padding:14px 20px; color:var(--sub); font-size:13px; font-weight:500; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .addcol:hover { border-color:var(--blue); color:var(--blue); background:var(--tint); }

  .taskcard.compact { display:flex; align-items:center; gap:8px; padding:8px 12px; cursor:pointer; }
  .cck { color:#30d158; font-size:12px; flex-shrink:0; }
  .ct { flex:1; min-width:0; font-size:13px; color:#9a9aa0; text-decoration:line-through;
    text-decoration-color:rgba(60,60,67,.2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.01em; }
  .cdur { font-size:10.5px; color:#c7c7cc; flex-shrink:0; }
  .showmore { list-style:none; text-align:center; padding:9px; font-size:12.5px; font-weight:600;
    color:var(--blue); cursor:pointer; border-radius:10px; transition:background .18s; }
  .showmore:hover { background:var(--tint); }
  .tfoot { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:6px; }
  .tstamp { font-size:10.5px; color:#c7c7cc; letter-spacing:0; min-width:0; }
  .tbchips { display:flex; gap:6px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
  .tbchip { border:none; background:rgba(120,120,128,.12); border-radius:99px; padding:6px 13px;
    font-size:12.5px; font-weight:600; color:var(--sub); cursor:pointer; transition:all .18s; }
  .tbchip.on { background:var(--blue); color:#fff; }
  @keyframes pulse { from { opacity:1; } to { opacity:.55; } }

  /* ===== delight layer ===== */
  .m-fill { position:relative; overflow:hidden; }
  .m-fill::after { content:''; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(100deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%);
    animation:shine 3.4s ease-in-out infinite; }
  @keyframes shine { 55% { transform:translateX(100%); } 100% { transform:translateX(100%); } }
  .taskcard.popdone { animation:popdone .55s var(--spring); }
  @keyframes popdone { 30% { transform:scale(1.05); box-shadow:0 10px 32px rgba(48,209,88,.4); } }
  .taskcard.newcard { animation:cardin .5s var(--spring); }
  @keyframes cardin { from { opacity:0; transform:translateY(-10px) scale(.95); } }
  .flame { display:inline-block; animation:flame 1.5s ease-in-out infinite; transform-origin:50% 88%; }
  @keyframes flame { 50% { transform:scale(1.25) rotate(-4deg); } }
  #workClock.running { animation:breathe 3.6s ease-in-out infinite; }
  @keyframes breathe { 50% { opacity:.72; } }
  .stat b.bump { display:inline-block; animation:bump .45s var(--spring); }
  @keyframes bump { 40% { transform:scale(1.4); color:var(--blue); } }
  .emptymsg { list-style:none; text-align:center; color:var(--faint); font-size:12.5px; padding:16px 8px; letter-spacing:-.01em; }
  #splash { position:fixed; inset:0; z-index:85; display:flex; flex-direction:column; align-items:center;
    justify-content:center; background:linear-gradient(135deg,#0b0b0f,#1c1430 60%,#221636); color:#fff;
    opacity:0; pointer-events:none; transition:opacity .7s ease; }
  #splash.on { opacity:1; }
  #splash .d1 { font-size:13px; letter-spacing:.24em; text-transform:uppercase; color:rgba(255,255,255,.5); }
  #splash .d2 { font-size:72px; font-weight:800; letter-spacing:-.03em; margin:6px 0;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #splash .d3 { font-size:14px; color:rgba(255,255,255,.65); max-width:72vw; text-align:center; font-style:italic; }
  .tacts { display:flex; gap:0; flex-shrink:0; }
  .tnote { font-size:12px; color:var(--sub); margin-top:6px; white-space:pre-wrap; word-break:break-word;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  /* "up next" spotlight on the first To-Do card */
  .taskcard.next-up { animation:nextpulse 2.4s ease-in-out infinite; }
  .taskcard.next-up.dragging { animation:none; }
  @keyframes nextpulse {
    0%, 100% { box-shadow:0 0 0 2px rgba(10,132,255,.45), 0 4px 16px rgba(10,132,255,.16); }
    50%      { box-shadow:0 0 0 3px rgba(191,90,242,.5),  0 6px 26px rgba(191,90,242,.28); }
  }
  .next-badge { display:inline-block; font-size:9px; font-weight:800; letter-spacing:.12em;
    text-transform:uppercase; color:#fff; background:var(--grad); border-radius:99px;
    padding:2.5px 9px; margin-bottom:7px; animation:badgefloat 2.4s ease-in-out infinite; }
  @keyframes badgefloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-2px); } }
  .dategroup { font-size:10.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:var(--sub); padding:8px 4px 2px; list-style:none; }
  /* insights */
  .icard { margin-bottom:22px; }
  .ihead { font-size:11.5px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--sub); margin-bottom:10px; }
  .isub { font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:#c7c7cc; margin-bottom:6px; }
  .irow { font-size:13.5px; margin:5px 0; letter-spacing:-.01em; }
  .irow b { font-weight:700; }
  .brow { display:flex; align-items:center; gap:10px; margin:6px 0; }
  .blabel { width:112px; font-size:12.5px; color:var(--sub); text-align:right; flex-shrink:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .btrack { flex:1; height:10px; background:rgba(120,120,128,.1); border-radius:99px; overflow:hidden; }
  .bfill { height:100%; background:var(--grad); border-radius:99px; transition:width .6s var(--spring); }
  .bval { width:112px; font-size:11.5px; color:var(--sub); flex-shrink:0; }
  @media (max-width:640px) { .blabel, .bval { width:86px; font-size:11px; } .seg button { font-size:12.5px; } }
  #repPeriod { border:none; background:rgba(120,120,128,.12); border-radius:10px; padding:8px 12px;
    font-size:13.5px; margin:8px 0 12px; color:var(--ink); }
  #repText { background:rgba(120,120,128,.08); border-radius:12px; padding:14px 16px;
    font:12.5px/1.65 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre-wrap;
    max-height:46vh; overflow:auto; color:var(--ink); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .chip { display:inline-flex; align-items:center; gap:5px; background:var(--tint); color:#0066cc;
    border-radius:980px; padding:3px 11px; font-size:11.5px; font-weight:500; cursor:pointer;
    max-width:100%; transition:background .18s; }
  .chip:hover { background:rgba(0,113,227,.16); }
  .chip span.n { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .chip .x { font-size:10px; padding:0 1px; color:#8ab6e8; }
  .chip.noData { background:rgba(120,120,128,.1); color:var(--sub); cursor:default; }

  .stats { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .stat { background:rgba(120,120,128,.08); border-radius:12px; padding:7px 14px; font-size:12px; color:var(--sub); }
  .stat b { color:var(--ink); font-size:15px; font-weight:700; margin-right:5px; }
  .taskfoot { display:flex; align-items:center; justify-content:space-between; margin-top:14px; padding:0 4px; }
  .hint { color:var(--sub); font-size:13px; letter-spacing:-.01em; }
  .clearbtn { border:none; background:none; color:var(--blue); font-size:13px; font-weight:500;
    cursor:pointer; padding:5px 10px; border-radius:980px; transition:background .18s; }
  .clearbtn:hover { background:var(--tint); }
  #dropzone { border:1.5px dashed rgba(60,60,67,.22); border-radius:16px; padding:13px; text-align:center;
    color:var(--sub); font-size:13px; margin-top:6px; transition:all .2s; letter-spacing:-.01em; }
  #dropzone.dragover { border-color:var(--blue); background:var(--tint); color:var(--blue); }

  /* overlays (duplicate dialog + celebration) */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.32); backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px); display:none; align-items:center; justify-content:center; z-index:50; }
  .overlay.on { display:flex; animation:fade .2s ease; }
  @keyframes fade { from { opacity:0; } to { opacity:1; } }
  .dialog { background:#fff; border-radius:22px; padding:28px; width:min(420px, calc(100vw - 48px));
    max-height:min(86vh, calc(100vh - 48px)); overflow-y:auto; -webkit-overflow-scrolling:touch;
    box-shadow:0 24px 80px rgba(0,0,0,.3); animation:rise .3s var(--spring); }
  .overlay { padding:24px 0; }
  #workText { overflow-wrap:anywhere; max-height:24vh; overflow-y:auto; }
  #workText.longtext { font-size:14.5px; font-weight:500; line-height:1.5; text-align:left; }
  .dialog h3 { font-size:19px; font-weight:700; letter-spacing:-.02em; margin-bottom:8px; }
  .dialog p { color:var(--sub); font-size:14px; margin-bottom:6px; }
  .dialog .q { background:rgba(120,120,128,.08); border-radius:12px; padding:10px 14px; font-size:14px;
    margin:10px 0; color:var(--ink); }
  .dlgrow { display:flex; gap:8px; margin-top:18px; }
  .dlgrow button { flex:1; border:none; border-radius:12px; padding:11px 0; font-size:14px; font-weight:500;
    cursor:pointer; transition:all .18s; }
  .dlg-merge { background:var(--blue); color:#fff; }
  .dlg-merge:hover { background:var(--blue-h); }
  .dlg-new { background:rgba(120,120,128,.12); color:var(--ink); }

<script>
const $ = id => document.getElementById(id);

const store = (k, v) => {
  try { localStorage.setItem(k, JSON.stringify(v)); }
  catch (e) { alert('Storage is full — could not save. Try removing large file attachments or export a backup.'); return; }
  if (k.startsWith('tk_') && !META_KEYS.includes(k)) markDirty();
};
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const dkey = d => d.toISOString().slice(0,10);
const todayKey = () => dkey(new Date(Date.now() - new Date().getTimezoneOffset()*60000));
const uid = () => 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const pick = a => a[Math.floor(Math.random() * a.length)];

/* ============ SHA-256 (public-domain style compact implementation) ============ */
function sha256(input) {
  const ascii = unescape(encodeURIComponent(input));
  function rr(v, a) { return (v >>> a) | (v << (32 - a)); }
  const maxWord = Math.pow(2, 32);
  let result = '';
  const words = [], asciiBitLength = ascii.length * 8;
  let hash = sha256.h = sha256.h || [], k = sha256.k = sha256.k || [];
  let primeCounter = k.length;
  const isComposite = {};
  for (let candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (let i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (Math.pow(candidate, .5) * maxWord) | 0;
      k[primeCounter++] = (Math.pow(candidate, 1 / 3) * maxWord) | 0;
    }
  }
  let a = ascii + '\x80';
  while (a.length % 64 - 56) a += '\x00';
  for (let i = 0; i < a.length; i++) {
    const j = a.charCodeAt(i);
    if (j >> 8) return null;
    words[i >> 2] |= j << ((3 - i) % 4) * 8;
  }
  words[words.length] = ((asciiBitLength / maxWord) | 0);
  words[words.length] = (asciiBitLength);
  for (let j = 0; j < words.length;) {
    const w = words.slice(j, j += 16);
    const oldHash = hash;
    hash = hash.slice(0, 8);
    for (let i = 0; i < 64; i++) {
      const w15 = w[i - 15], w2 = w[i - 2];
      const A = hash[0], e = hash[4];
      const temp1 = hash[7]
        + (rr(e, 6) ^ rr(e, 11) ^ rr(e, 25))
        + ((e & hash[5]) ^ ((~e) & hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (w[i - 16] + (rr(w15, 7) ^ rr(w15, 18) ^ (w15 >>> 3)) + w[i - 7] + (rr(w2, 17) ^ rr(w2, 19) ^ (w2 >>> 10))) | 0);
      const temp2 = (rr(A, 2) ^ rr(A, 13) ^ rr(A, 22)) + ((A & hash[1]) ^ (A & hash[2]) ^ (hash[1] & hash[2]));
      hash = [(temp1 + temp2) | 0].concat(hash);
      hash[4] = (hash[4] + temp1) | 0;
    }
    for (let i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i]) | 0;
  }
  for (let i = 0; i < 8; i++) {
    for (let j = 3; j + 1; j--) {
      const b = (hash[i] >> (j * 8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

/* ============ cloud sync engine (offline-first, /api/state, LWW) ============ */
/* localStorage is the working copy. Edits mark dirty + debounce-push to the cloud.
   Unlock / reconnect / every 60s: pull; newer remote copy replaces local.
   File attachment payloads are DEVICE-LOCAL (too big for KV) — names sync, bytes don't. */
let pushT = null;
function markDirty() {
  try {
    localStorage.setItem('tk_updatedAt', JSON.stringify(Date.now()));
    localStorage.setItem('tk_dirty', 'true');
  } catch {}
  clearTimeout(pushT); pushT = setTimeout(syncPush, 1800);
}
function getPass() { try { return sessionStorage.getItem('tk_sess') || getTrust(); } catch { return getTrust(); } }
function setPassSess(v) { try { sessionStorage.setItem('tk_sess', v); } catch {} }
/* trusted device: remember the passcode (obfuscated) for 30 days so unlock isn't asked every visit */
const TRUST_DAYS = 30;
function saveTrust(v) {
  try { localStorage.setItem('tk_trust', JSON.stringify({ p: btoa(unescape(encodeURIComponent(v))), exp: Date.now() + TRUST_DAYS * 864e5 })); } catch {}
}
function getTrust() {
  try { const t = JSON.parse(localStorage.getItem('tk_trust'));
    if (t && t.exp > Date.now()) return decodeURIComponent(escape(atob(t.p))); } catch {}
  return null;
}
function clearTrust() { try { localStorage.removeItem('tk_trust'); sessionStorage.removeItem('tk_sess'); } catch {} }
function lockNow() { clearTrust(); location.reload(); }
function collectState() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('tk_') && !META_KEYS.includes(k)) data[k] = localStorage.getItem(k);
  }
  try { // strip attachment payloads before upload
    const t = JSON.parse(data.tk_tasks || '[]');
    t.forEach(x => (x.files || []).forEach(f => { delete f.data; }));
    data.tk_tasks = JSON.stringify(t);
  } catch {}
  return data;
}
function applyRemote(data) {
  const localFiles = {};
  try { // keep this device's attachment bytes across the swap
    JSON.parse(localStorage.getItem('tk_tasks') || '[]')
      .forEach(t => (t.files || []).forEach(f => { if (f.data) localFiles[t.id + '|' + f.name] = f.data; }));
  } catch {}
  Object.keys(localStorage).filter(k => k.startsWith('tk_') && !META_KEYS.includes(k))
    .forEach(k => localStorage.removeItem(k));
  Object.entries(data).forEach(([k, v]) => {
    if (k.startsWith('tk_') && !META_KEYS.includes(k)) localStorage.setItem(k, v);
  });
  try {
    const t = JSON.parse(localStorage.getItem('tk_tasks') || '[]');
    t.forEach(x => (x.files || []).forEach(f => { const d = localFiles[x.id + '|' + f.name]; if (d) f.data = d; }));
    localStorage.setItem('tk_tasks', JSON.stringify(t));
  } catch {}
}
/* task-level merge for concurrent edits on two devices:
   base = LOCAL order; per task the newer version (touchedAt/doneAt/editedAt/createdAt) wins;
   tasks created on the other device are added; tasks we deleted here stay deleted (tombstones). */
function tTime(t) { return t.touchedAt || t.doneAt || t.editedAt || t.createdAt || 0; }
function mergeRemote(remoteState) {
  const rdata = remoteState.data || {};
  // merge COLUMNS first — union of both sides. (Regression guard: keeping only the local
  // column list silently deleted queues created on the other device and re-homed their
  // tasks into To Do — the "nab queue" bug.)
  let rC = [], lC = [];
  try { rC = JSON.parse(rdata.tk_cols || '[]'); } catch {}
  try { lC = JSON.parse(localStorage.getItem('tk_cols') || '[]'); } catch {}
  const lcIds = new Set(lC.map(c => c.id));
  const colsU = lC.slice();
  rC.forEach(c => { if (c && c.id && !lcIds.has(c.id)) colsU.push(c); });
  if (colsU.length) localStorage.setItem('tk_cols', JSON.stringify(colsU));
  let rT = [], lT = [];
  try { rT = JSON.parse(rdata.tk_tasks || '[]'); } catch {}
  try { lT = JSON.parse(localStorage.getItem('tk_tasks') || '[]'); } catch {}
  const lastSync = load('tk_lastSyncAt', 0);
  const tombs = load('tk_tomb', []);
  const rById = {}; rT.forEach(t => { if (t.id) rById[t.id] = t; });
  const lIds = new Set(lT.map(t => t.id));
  const merged = lT.map(lt => {
    const rt = rById[lt.id];
    return (rt && tTime(rt) > tTime(lt)) ? rt : lt;
  });
  rT.forEach(rt => {
    if (lIds.has(rt.id)) return;
    if (tombs.some(x => x.id === rt.id && x.ts > lastSync)) return;   // deleted on this device
    merged.push(rt);                                                   // created on the other device
  });
  localStorage.setItem('tk_tasks', JSON.stringify(merged));
  // non-task keys keep the LOCAL (dirty) version; the merged blob pushes next
}
function tombstone(t) {
  try {
    const d = load('tk_tomb', []);
    d.push({ id: t.id, ts: Date.now() });
    localStorage.setItem('tk_tomb', JSON.stringify(d.slice(-200)));
  } catch {}
}

function setSyncUI(state) {
  const el = $('syncdot'); if (!el) return;
  const m = { synced:['#30d158','Synced to cloud'], offline:['#ff9f0a','Offline — will sync when online'],
    syncing:['#0a84ff','Syncing…'], error:['#ff3b30','Sync error — retrying'], off:['#c7c7cc','Local only (no sync server)'] };
  const [c, t] = m[state] || m.off;
  el.style.background = c; $('synclabel').textContent = t;
}
/* client error reporting → /api/alert → email (max 1/min from this device) */
let lastReport = 0;
function reportError(type, message) {
  try {
    if (!getPass() || !navigator.onLine) return;
    if (Date.now() - lastReport < 60000) return;
    lastReport = Date.now();
    fetch('./api/alert', {
      method: 'POST',
      headers: { 'x-app-pass': getPass(), 'content-type': 'application/json' },
      body: JSON.stringify({ type, message: String(message).slice(0, 1500) })
    }).catch(() => {});
  } catch {}
}
addEventListener('error', e => reportError('js', (e.message || 'error') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?')));
addEventListener('unhandledrejection', e => reportError('promise', String((e.reason && e.reason.stack) || e.reason || 'unhandled rejection')));

async function api(method, body, pass) {
  return fetch('./api/state', {
    method,
    headers: { 'x-app-pass': pass ?? getPass() ?? '', 'content-type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
}
async function syncPush() {
  if (!getPass() || !navigator.onLine) { setSyncUI(navigator.onLine ? 'off' : 'offline'); return; }
  if (localStorage.getItem('tk_dirty') !== 'true') return;
  setSyncUI('syncing');
  try {
    const r = await api('PUT', { updatedAt: load('tk_updatedAt', 0), data: collectState() });
    if (r.status === 409) { // another device saved concurrently → MERGE, never discard either side
      const j = await r.json();
      if (j && j.state) {
        mergeRemote(j.state);
        localStorage.setItem('tk_updatedAt', JSON.stringify(Date.now()));
        localStorage.setItem('tk_dirty', 'true');
        refreshUI();
        toast('Merged changes from your other device');
        setTimeout(syncPush, 900);      // push the merged result
      }
      return;
    }
    if (!r.ok) throw 0;
    localStorage.setItem('tk_dirty', 'false');
    localStorage.setItem('tk_lastSyncAt', JSON.stringify(Date.now()));
    setSyncUI('synced');
  } catch { setSyncUI(navigator.onLine ? 'error' : 'offline'); }
}
async function syncPull() {
  if (!getPass() || !navigator.onLine) return false;
  try {
    const r = await api('GET');
    if (!r.ok) {
      if (r.status === 404) reportError('http-404', '/api/state returned 404 — API route missing from deployment');
      else if (r.status >= 500) reportError('http-' + r.status, '/api/state returned ' + r.status);
      setSyncUI(r.status === 503 ? 'off' : 'error');
      return false;
    }
    const j = await r.json();
    const remote = j && j.state;
    const localAt = load('tk_updatedAt', 0);
    if (remote && remote.updatedAt > localAt) {
      if (localStorage.getItem('tk_dirty') === 'true') {
        mergeRemote(remote);            // both sides changed → task-level merge, then push ours
        localStorage.setItem('tk_updatedAt', JSON.stringify(Date.now()));
        refreshUI();
        setTimeout(syncPush, 400);
      } else {
        applyRemote(remote.data);
        localStorage.setItem('tk_updatedAt', JSON.stringify(remote.updatedAt));
        localStorage.setItem('tk_dirty', 'false');
        localStorage.setItem('tk_lastSyncAt', JSON.stringify(Date.now()));
        refreshUI();                    // in-place — never reloads, never interrupts a running timer
        setSyncUI('synced');
      }
      return true;
    }
    if (localStorage.getItem('tk_dirty') === 'true') syncPush(); else setSyncUI('synced');
    return false;
  } catch { setSyncUI('error'); return false; }
}
addEventListener('online', () => {
  if (localStorage.getItem('tk_dirty') === 'true') syncPush();
  else syncPull();
});
addEventListener('offline', () => setSyncUI('offline'));
setInterval(() => {
  if (!booted) return;
  if (localStorage.getItem('tk_dirty') === 'true') syncPush();
  else syncPull();
}, 60000);

/* ============ passcode gate ============ */
/* The passcode is set SERVER-SIDE (APP_PASSCODE in Vercel — same pattern as the
   Translator app) and verified against /api/state. A hash is cached locally so you
   can unlock OFFLINE after the first online unlock. Not encryption — a privacy gate. */
let lockBusy = false;
async function initLock() {
  const trusted = getTrust();
  if (trusted) {                        // trusted device: skip the prompt, sync, go straight in
    setPassSess(trusted);
    $('lock').style.display = 'none';
    $('wrap').classList.remove('blurred');
    await syncPull();                   // freshest cloud copy BEFORE state initializes
    boot(); checkMilestones();
    return;
  }
  $('locksub').textContent = 'Enter your passcode';
  $('lockbtn').textContent = 'Unlock';
  $('forgot').style.display = 'inline-block';
  $('pass').focus();
}
async function lockSubmit() {
  if (lockBusy) return; lockBusy = true; $('lockbtn').textContent = '…';
  const v = $('pass').value;
  const fail = m => { $('lockerr').textContent = m; $('lockbox').classList.add('shake');
    setTimeout(() => $('lockbox').classList.remove('shake'), 450); $('pass').value = ''; $('pass').focus(); };
  const done = () => { lockBusy = false; $('lockbtn').textContent = 'Unlock'; };
  if (!v) { fail('Enter your passcode.'); done(); return; }

  let serverStatus = null;
  if (navigator.onLine) {
    try { serverStatus = (await api('GET', null, v)).status; } catch { serverStatus = null; }
  }
  if (serverStatus === 200) {           // server-verified: cache hash for offline unlocks
    try { localStorage.setItem('tk_pass', JSON.stringify(sha256(v))); } catch {}
    setPassSess(v); saveTrust(v);       // remember this device for 30 days
    await syncPull();                   // adopt the newest cloud copy before showing the app
    unlock(); done(); return;
  }
  if (serverStatus === 401) { fail('Wrong passcode.'); done(); return; }

  const cached = load('tk_pass', null); // offline / no server: fall back to cached hash
  if (cached && sha256(v) === cached) {
    setPassSess(v); saveTrust(v); unlock();
    setSyncUI(serverStatus === 503 ? 'off' : 'offline');
    done(); return;
  }
  if (!cached) {
    if (serverStatus === 503 &&        // no sync server: allow local-only mode
        confirm('No sync server is configured. Use this passcode for THIS DEVICE only (local mode, no cloud sync)?')) {
      try { localStorage.setItem('tk_pass', JSON.stringify(sha256(v))); } catch {}
      saveTrust(v); unlock(); setSyncUI('off'); done(); return;
    }
    fail(navigator.onLine
      ? 'Could not verify. Check the sync server is set up (APP_PASSCODE in Vercel).'
      : 'First unlock on a new device needs internet.');
    done(); return;
  }
  fail('Wrong passcode.'); done();
}
function unlock() {
  $('lock').style.display = 'none';
  $('wrap').classList.remove('blurred');
  boot();
  checkMilestones();
}
$('lockbtn').onclick = lockSubmit;
$('pass').addEventListener('keydown', e => { if (e.key === 'Enter') lockSubmit(); });
$('forgot').onclick = () => {
  if (!confirm('The passcode itself is changed in Vercel (APP_PASSCODE env var + redeploy).\n\nReset THIS DEVICE instead? It erases local data on this device only — the cloud copy stays.')) return;
  if (!confirm('Really sure? Local data on this device will be erased.')) return;
  Object.keys(localStorage).filter(k => k.startsWith('tk_')).forEach(k => localStorage.removeItem(k));
  try { sessionStorage.removeItem('tk_sess'); } catch {}
  location.reload();
};

const fx = $('fx'), fctx = fx.getContext('2d');
let parts = [], fxRun = false;
function sizeFx() { fx.width = innerWidth; fx.height = innerHeight; }
addEventListener('resize', sizeFx); sizeFx();
function confetti(n = 140) {
  const colors = ['#0a84ff', '#bf5af2', '#ff9f0a', '#30d158', '#ff375f', '#ffd60a'];
  for (let i = 0; i < n; i++) parts.push({
    x: Math.random() * fx.width, y: -20 - Math.random() * fx.height * .25,
    w: 6 + Math.random() * 6, h: 8 + Math.random() * 8, c: colors[i % colors.length],
    vy: 2 + Math.random() * 3.5, vx: -2 + Math.random() * 4,
    r: Math.random() * Math.PI, vr: -.15 + Math.random() * .3, o: 1
  });
  if (!fxRun) { fxRun = true; requestAnimationFrame(tickFx); }
}
function tickFx() {
  fctx.clearRect(0, 0, fx.width, fx.height);
  parts.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += .05; p.r += p.vr; if (p.y > fx.height * .7) p.o -= .04; });
  parts = parts.filter(p => p.o > 0 && p.y < fx.height + 40);
  parts.forEach(p => { fctx.save(); fctx.globalAlpha = Math.max(p.o, 0); fctx.translate(p.x, p.y);
    fctx.rotate(p.r); fctx.fillStyle = p.c; fctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); fctx.restore(); });
  if (parts.length) requestAnimationFrame(tickFx);
  else { fxRun = false; fctx.clearRect(0, 0, fx.width, fx.height); }
}
function confettiAt(x, y, n = 45) {     // radial burst from a point (e.g. the checkbox you just ticked)
  const colors = ['#0a84ff', '#bf5af2', '#ff9f0a', '#30d158', '#ff375f', '#ffd60a'];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = 2.5 + Math.random() * 5;
    parts.push({ x, y, w: 5 + Math.random() * 5, h: 6 + Math.random() * 6, c: colors[i % colors.length],
      vx: Math.cos(a) * v, vy: Math.sin(a) * v - 3, r: Math.random() * Math.PI, vr: -.2 + Math.random() * .4, o: 1 });
  }
  if (!fxRun) { fxRun = true; requestAnimationFrame(tickFx); }
}
function chime() {                      // soft two-note completion chime (quiet, tasteful)
  try {
    const c = new (window.AudioContext || window.webkitAudioContext)();
    [[660, 0], [880, .09]].forEach(([f, d]) => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination); o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(.06, c.currentTime + d);
      g.gain.exponentialRampToValueAtTime(.001, c.currentTime + d + .18);
      o.start(c.currentTime + d); o.stop(c.currentTime + d + .2);
    });
    setTimeout(() => { try { c.close(); } catch {} }, 700);
  } catch {}
}
let toastT;
function toast(msg) {
  $('toast').textContent = msg; $('toast').classList.add('on');
  clearTimeout(toastT); toastT = setTimeout(() => $('toast').classList.remove('on'), 2600);
}
function celebrate(emoji, title, msg) {
  $('celebEmoji').textContent = emoji; $('celebTitle').textContent = title; $('celebMsg').textContent = msg;
  $('celebrate').classList.add('on');

}

function exportData() {
  const out = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('tk_') && !META_KEYS.includes(k)) out[k] = localStorage.getItem(k); // data only — no passcode/sync metadata
  }
  const blob = new Blob([JSON.stringify({ app:'personal-toolkit', exported:new Date().toISOString(), data:out }, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bigplan-backup-' + todayKey() + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}
async function cloudBackup() {
  if (!getPass()) { toast('Unlock with the sync passcode first'); return; }
  try {
    const r = await fetch('./api/export', { headers: { 'x-app-pass': getPass() } });
    if (!r.ok) throw 0;
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bigplan-cloud-backup-' + todayKey() + '.json';
    a.click(); URL.revokeObjectURL(a.href);
    toast('Cloud backup downloaded (state + 14 daily snapshots)');

$('importfile').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      let j = JSON.parse(r.result);
      if (j && j.app === 'bigplan-cloud-backup' && j.current && j.current.data)
        j = { app: 'personal-toolkit', exported: j.exported, data: j.current.data }; // restore cloud backups too
      if (!j || j.app !== 'personal-toolkit' || !j.data) { alert('Not a valid BigPlan backup file.'); return; }
      if (!confirm('Import backup from ' + (j.exported || 'unknown date') + '? This replaces current data (your passcode stays).')) return;
      const passHash = localStorage.getItem('tk_pass');
      const trust = localStorage.getItem('tk_trust');
      Object.keys(localStorage).filter(k => k.startsWith('tk_')).forEach(k => localStorage.removeItem(k));
      Object.entries(j.data).forEach(([k, v]) => {
        if (k.startsWith('tk_') && !META_KEYS.includes(k)) localStorage.setItem(k, v); // never import stale sync metadata
      });
      if (passHash) localStorage.setItem('tk_pass', passHash);   // keep this device's passcode
      if (trust) localStorage.setItem('tk_trust', trust);        // keep the 30-day device trust
      localStorage.setItem('tk_updatedAt', JSON.stringify(Date.now())); // imported data is the NEWEST copy…
      localStorage.setItem('tk_dirty', 'true');                         // …so it pushes to the cloud, not gets overwritten by it
      location.reload();
    } catch { alert('Could not read that file.'); }
  };
  r.readAsText(f);
  e.target.value = '';
});

/* ============ kanban tasks ============ */
const MAX_FILE = 1.5 * 1024 * 1024;
/* IMPORTANT: state initializes in initState() — called from boot() AFTER the cloud
   pull — never at script parse time. Initializing early caused stale in-memory data
   to overwrite freshly-pulled cloud data on the first edit (the cross-device sync bug). */
let cols = [], tasks = [];
let mission = { goal: '', keywords: ['minglitang'], milestones: [] };
function initState() {
  mission = load('tk_mission', { goal: '', keywords: ['minglitang'], milestones: [] });
  cols = load('tk_cols', null) || [
    { id: 'c-todo', name: 'To Do' },
    { id: 'c-done', name: 'Done' }
  ];
  tasks = load('tk_tasks', []);
  const migBase = Date.now();
  // SAFETY NET: if any open task references a queue we don't have, RECREATE the queue
  // ("Recovered") instead of silently sweeping its tasks into To Do. Losing a column
  // must never mean losing the grouping.
  const missingCols = new Set(tasks.filter(t => !t.done && t.col && !cols.some(c => c.id === t.col)).map(t => t.col));
  missingCols.forEach(id => cols.push({ id, name: 'Recovered' }));
  tasks.forEach((t, i) => {
    if (!t.files) t.files = [];
    if (!t.id) t.id = uid();
    if (!t.createdAt) t.createdAt = migBase + i;   // preserve existing relative order
    if (!t.col || !cols.some(c => c.id === t.col)) t.col = t.done ? (cols[cols.length-1] || cols[0]).id : cols[0].id;
    if (t.done && !t.queueName) {           // backfill queue context for older completions
      const pc = cols.find(c => c.id === t.prevCol);
      t.queueName = pc ? pc.name : 'To Do';
    }
  });
  // NOTE: no sorting here — array order IS the user's chosen sequence and must survive
  // reloads and cloud sync. (A createdAt re-sort here silently destroyed drag ordering.)
  // Default remains oldest-first because new tasks append to the end.
  // retire the old default "In Progress" column: move its tasks to the first column
  const doing = cols.find(c => c.id === 'c-doing');
  if (doing && cols.length > 1) {
    const dest = cols.find(c => c.id !== 'c-doing');
    tasks.forEach(t => { if (t.col === 'c-doing') t.col = dest.id; });
    cols.splice(cols.indexOf(doing), 1);
  }
  // completed tasks always live in the Done column, each with a completion date
  const dc = doneColId();
  tasks.forEach(t => {
    if (t.done) {
      if (!t.doneAt) t.doneAt = t.createdAt || Date.now();
      if (dc && t.col !== dc) { t.prevCol = t.prevCol || t.col; t.col = dc; }
    }
  });
  // the Done column always renders last
  const di = cols.findIndex(c => c.id === dc);
  if (di >= 0 && di !== cols.length - 1) cols.push(cols.splice(di, 1)[0]);
}

function saveAll() { store('tk_tasks', tasks); store('tk_cols', cols); renderBoard(); }

/* ---- silent signal collection (feeds Insights + the future AI review) ---- */
const devTag = () => (matchMedia('(pointer:coarse)').matches || innerWidth < 700) ? 'mobile' : 'desktop';
const touch = t => { t.touchedAt = Date.now(); };   // per-task change stamp — drives the sync merge
function usageBump(kind) {              // app opens (o) + work-mode sessions (w) per day, rolling 60 days
  const u = load('tk_usage', {});
  const k = todayKey();
  u[k] = u[k] || { o: 0, w: 0 };
  u[k][kind] = (u[k][kind] || 0) + 1;
  const days = Object.keys(u).sort();
  if (days.length > 60) days.slice(0, days.length - 60).forEach(d => delete u[d]);
  store('tk_usage', u);
}
function logDeleted(t) {                // abandonment churn: what gets deleted without being done
  const d = load('tk_deleted', []);
  d.push({ t: t.text.slice(0, 60), ts: Date.now(), age: Math.round((Date.now() - (t.createdAt || Date.now())) / 864e5) });
  store('tk_deleted', d.slice(-50));
}

let doneExpanded = false;
function compactDoneLi(t) {             // title-only row; tap to expand into the full card
  const li = document.createElement('li'); li.className = 'taskcard compact';
  li.title = 'Tap to see details';
  const ck = document.createElement('span'); ck.className = 'cck'; ck.textContent = '✓';

  li.append(ck, tx);

  return li;
}
function doneColId() {
  const c = cols.find(c => c.id === 'c-done' || /^(done|complete[d]?|完成)$/i.test((c.name || '').trim())) || cols[cols.length - 1];
  return c ? c.id : null;
}
function dateLabel(ms) {
  if (!ms) return 'Earlier';
  const d = new Date(ms), now = new Date();
  const day = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  const diff = Math.round((day(now) - day(d)) / 864e5);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  return d.toLocaleDateString(undefined, { weekday:'short', day:'numeric', month:'short' });
}

let draggedId = null, justAddedId = null;

function taskLi(t) {
  const li = document.createElement('li');
  li.className = 'taskcard' + (t.done ? ' done' : '');
  if (t.id === justAddedId) { li.classList.add('newcard'); justAddedId = null; }
  li.dataset.tid = t.id;
  li.draggable = true;
  touchDragInit(li, t);
  const row = document.createElement('div'); row.className = 'trow-main';

  const lab = document.createElement('label'); lab.className = 'ck';
  const cb = document.createElement('input'); cb.type = 'checkbox'; cb.checked = t.done;
  cb.onchange = () => {
    t.done = cb.checked;
    touch(t);
    if (cb.checked) {                       // completing → stamp it and move to the Done list
      t.doneAt = Date.now();
      t.doneDevice = devTag();
      t.queueName = (cols.find(c => c.id === t.col) || {}).name || 'To Do';  // remember its context queue
      const dcc = doneColId();
      if (dcc && t.col !== dcc) { t.prevCol = t.col; t.col = dcc; }
      bumpDone();
      if (t.repeat) respawnRepeat(t);
      li.classList.add('popdone');

    } else {                                // un-completing → back to where it came from
      delete t.doneAt;
      if (t.prevCol && cols.some(c => c.id === t.prevCol)) t.col = t.prevCol;
      delete t.prevCol;
    }
    setTimeout(saveAll, 220);
  };
  const box = document.createElement('span'); box.className = 'box';
  lab.append(cb, box);

  const sp = document.createElement('span'); sp.className = 't'; sp.textContent = t.text;
  if (!t.done) { sp.style.cursor = 'pointer'; sp.title = 'Tap to focus on this task and track time'; sp.onclick = () => openWork(t); }
  const del = document.createElement('button'); del.className = 'x'; del.textContent = '✕';
  del.onclick = () => { if (!t.done) logDeleted(t); tombstone(t); tasks.splice(tasks.indexOf(t), 1); saveAll(); };
  /* actions live in their own bottom row so the task text keeps full width */
  const ed = document.createElement('button'); ed.className = 'x up'; ed.textContent = '✎';
  ed.title = 'Edit task';
  ed.onclick = () => openEdit(t);
  const att = document.createElement('button'); att.className = 'x up'; att.textContent = '📎';
  att.title = 'Attach file';
  att.onclick = () => { attachTarget = t; $('attachfile').click(); };
  const acts = document.createElement('div'); acts.className = 'tacts';
  if (!t.done) {
    const isRock = t.rockWeek === weekKey();
    if (isRock) li.classList.add('rock');
    const rk = document.createElement('button'); rk.className = 'x up rockbtn' + (isRock ? ' on' : '');
    rk.textContent = isRock ? '★' : '☆';
    rk.title = isRock ? 'Remove from this week’s rocks' : 'Make this a rock for this week (max 3)';
    rk.onclick = () => toggleRock(t);
    const up = document.createElement('button'); up.className = 'x up'; up.textContent = '⤒';
    up.title = 'Move to top';
    up.onclick = () => moveToTop(t);
    acts.append(rk, up, ed, att, del);
  } else {
    acts.append(ed, att, del);
  }
  row.append(lab, sp);
  li.appendChild(row);

  if (t.note) {
    const nt = document.createElement('div'); nt.className = 'tnote';
    nt.textContent = t.note;
    li.appendChild(nt);
  }

  if (t.files.length) {
    const chips = document.createElement('div'); chips.className = 'chips';
    t.files.forEach((f, fi) => {
      const c = document.createElement('span');
      c.className = 'chip' + (f.data ? '' : ' noData');
      c.title = f.data ? 'Click to download' : 'Reference only (over 1.5 MB, content not stored)';
      const n = document.createElement('span'); n.className = 'n';
      n.textContent = '📎 ' + f.name + ' (' + fmtSize(f.size) + ')';
      c.appendChild(n);
      if (f.data) c.onclick = ev => { if (ev.target.classList.contains('x')) return; viewFile(f); };
      const rm = document.createElement('button'); rm.className = 'x'; rm.textContent = '✕';
      rm.onclick = ev => { ev.stopPropagation(); t.files.splice(fi, 1); touch(t); saveAll(); };
      c.appendChild(rm); chips.appendChild(c);
    });
    li.appendChild(chips);
  }

  const tfoot = document.createElement('div'); tfoot.className = 'tfoot';
  const ts = document.createElement('span'); ts.className = 'tstamp';
  const stk = t.done ? (t.streakAtDone || 0) : liveStreak(t);   // (generated text only — safe as HTML)
  ts.innerHTML = 'Added ' + fmtDate(t.createdAt)
    + (t.done && t.doneAt ? '  ·  ✓ Done ' + fmtDate(t.doneAt) : '')
    + (t.timeSpent ? '  ·  ⏱ ' + fmtDurLabel(t.timeSpent) : '')
    + (t.repeat ? '  ·  🔁' + (stk ? ' <span class="flame">🔥</span>' + stk : '') : '');
  tfoot.append(ts, acts);
  li.appendChild(tfoot);

  li.addEventListener('dragstart', e => {
    draggedId = t.id;
    e.dataTransfer.setData('text/plain', t.id);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => li.classList.add('dragging'), 0);
  });
  li.addEventListener('dragend', () => { draggedId = null; li.classList.remove('dragging'); clearMarks(); });

  li.addEventListener('dragover', e => {
    e.preventDefault(); e.stopPropagation();
    if (isFileDrag(e)) { li.classList.add('dragover-file'); return; }
    if (!draggedId || draggedId === t.id) return;
    const r = li.getBoundingClientRect();
    const above = (e.clientY - r.top) < r.height / 2;
    li.classList.toggle('insert-above', above);
    li.classList.toggle('insert-below', !above);
  });
  li.addEventListener('dragleave', () => { li.classList.remove('dragover-file', 'insert-above', 'insert-below'); });
  li.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    if (isFileDrag(e)) { li.classList.remove('dragover-file'); attachFiles(t, e.dataTransfer.files); return; }
    const above = li.classList.contains('insert-above');
    li.classList.remove('insert-above', 'insert-below');
    moveTask(draggedId, t, above);
  });
  return li;
}

function isFileDrag(e) { return Array.from(e.dataTransfer.types || []).includes('Files'); }
function clearMarks() { document.querySelectorAll('.insert-above,.insert-below,.dragover-file,.dragover-col')
  .forEach(x => x.classList.remove('insert-above','insert-below','dragover-file','dragover-col')); }

/* ---- work mode: per-card time tracking ---- */
let workTask = null, workTick = null, workStartMs = 0, workBase = 0, workSessStart = 0;
let workTarget = 0, workAlarmFired = false, workOpenBase = 0;   // timebox (absorbed Focus timer)
const TB_CHOICES = [15, 25, 45, 90];
function renderTbChips() {
  const w = $('tbchips'); if (!w) return;
  w.innerHTML = '';
  TB_CHOICES.forEach(m => {
    const b = document.createElement('button');
    b.className = 'tbchip' + (workTarget === m ? ' on' : '');
    b.textContent = m + 'm';
    b.onclick = () => { workTarget = (workTarget === m ? 0 : m); workAlarmFired = false; stopAlarm(); renderTbChips(); paintWork(); };
    w.appendChild(b);
  });
  const off = document.createElement('button');
  off.className = 'tbchip' + (!workTarget ? ' on' : '');
  off.textContent = 'No limit';
  off.onclick = () => { workTarget = 0; stopAlarm(); renderTbChips(); paintWork(); };
  w.appendChild(off);
  $('workBarWrap').style.display = workTarget ? 'block' : 'none';
}
function pushSession() {                // per-task work session log: [startMs, seconds]
  if (!workSessStart || !workTask) return;
  const secs = Math.round((Date.now() - workSessStart) / 1000);
  if (secs >= 30) {
    (workTask.sessions = workTask.sessions || []).push([workSessStart, secs]);
    if (workTask.sessions.length > 30) workTask.sessions = workTask.sessions.slice(-30);
  }
  workSessStart = 0;
}
function fmtDur(s) {
  s = Math.round(s);
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = s % 60;
  return h ? h + ':' + String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0')
           : String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}
function fmtDurLabel(s) {
  s = Math.round(s);
  const h = Math.floor(s / 3600), m = Math.round(s % 3600 / 60);
  return h ? h + 'h ' + m + 'm' : (m >= 1 ? m + 'm' : s + 's');
}
function curElapsed() { return workBase + (workStartMs ? (Date.now() - workStartMs) / 1000 : 0); }
function paintWork() {
  $('workClock').textContent = fmtDur(curElapsed());
  if (workTarget) {                     // timebox progress + alarm at target
    const sess = curElapsed() - workOpenBase;
    $('workBar').style.width = Math.min(100, sess / (workTarget * 60) * 100) + '%';
    if (sess >= workTarget * 60 && !workAlarmFired && workStartMs) {
      workAlarmFired = true;
      startAlarm();
      toast('⏰ ' + workTarget + 'm timebox reached — break or push on, your call');
    }
  }
  $('workPrev').textContent = (workBase > 0 && !workStartMs) ? 'Logged so far: ' + fmtDurLabel(workBase) : ' ';
}
function openWork(t) {
  usageBump('w');
  workTask = t; workBase = t.timeSpent || 0; workStartMs = 0; workSessStart = 0;
  workOpenBase = workBase; workAlarmFired = false;
  renderTbChips();
  $('workText').textContent = t.text;
  $('workText').classList.toggle('longtext', t.text.length > 90);
  $('workNote').textContent = t.note || '';
  saveWorkLive();
  $('workToggle').textContent = workBase > 0 ? 'Resume' : 'Start';
  paintWork();
  $('work').classList.add('on');
}
function workToggle() {
  if (workStartMs) {                    // pause — persist what's logged
    workBase = curElapsed(); pushSession(); workStartMs = 0;
    clearInterval(workTick); workTick = null;
    workTask.timeSpent = Math.round(workBase); touch(workTask); saveAll();
    $('workClock').classList.remove('running');
    $('workToggle').textContent = 'Resume';
  } else {                              // start / resume
    workStartMs = Date.now(); workSessStart = workStartMs;
    $('workClock').classList.add('running');
    workTick = setInterval(() => {
      paintWork();
      focusMsg();
      if (Date.now() - lastLiveW > 5000) { lastLiveW = Date.now(); saveWorkLive(); }  // live-persist every 5s
    }, 500);
    $('workToggle').textContent = 'Pause';
  }
  saveWorkLive();
  paintWork();
}
function stopAndSave() {
  if (workStartMs) { workBase = curElapsed(); pushSession(); workStartMs = 0; }
  clearInterval(workTick); workTick = null;
  if (workTask && workBase > 0) { workTask.timeSpent = Math.round(workBase); touch(workTask); }
}
/* encouragement that deepens with the session */
const FOCUS_MSGS = [
  [1, 'Settling in…'],
  [5, '5 minutes — the hardest part is behind you'],
  [10, '10 minutes deep. Momentum is real now'],
  [25, '25m — a full pomodoro. Strong.'],
  [45, '45 minutes of deep work — rare air'],
  [60, 'One hour. This is how big things get built'],
  [90, '90 minutes — legendary block. A break is earned'],
  [120, 'Two hours deep. Remember to stand up 🙂']
];
function focusMsg() {
  if (!workStartMs) return;
  const mins = (curElapsed() - workOpenBase) / 60;
  let msg = '';
  FOCUS_MSGS.forEach(([m, s]) => { if (mins >= m) msg = s; });
  if (msg) $('workPrev').textContent = msg;
}
let lastLiveW = 0;
function saveWorkLive() {               // continuously persisted live timer — survives reloads/updates
  try {
    if (!workTask) { localStorage.removeItem('tk_worklive'); return; }
    localStorage.setItem('tk_worklive', JSON.stringify({
      id: workTask.id, elapsed: Math.round(curElapsed()), running: !!workStartMs, ts: Date.now()
    }));
  } catch {}
}
function closeWork() {
  stopAlarm();
  stopAndSave();
  $('workClock').classList.remove('running');
  if (workTask) saveAll();
  $('work').classList.remove('on'); workTask = null;
  saveWorkLive();                       // clears the live-timer record
}
function workComplete() {
  stopAlarm();
  stopAndSave();
  $('workClock').classList.remove('running');
  confetti(130); chime();
  const t = workTask;
  $('work').classList.remove('on'); workTask = null;
  saveWorkLive();                       // clears the live-timer record
  if (!t) return;
  t.done = true; t.doneAt = Date.now(); t.doneDevice = devTag();
  t.queueName = (cols.find(c => c.id === t.col) || {}).name || 'To Do';
  const dc = doneColId();
  if (dc && t.col !== dc) { t.prevCol = t.col; t.col = dc; }
  bumpDone();
  if (t.repeat) respawnRepeat(t);
  saveAll();
}

function moveToTop(t) {
  const idx = tasks.indexOf(t); if (idx < 0) return;
  t.moves = (t.moves || 0) + 1;
  tasks.splice(idx, 1);
  const firstIdx = tasks.findIndex(x => x.col === t.col);
  tasks.splice(firstIdx < 0 ? tasks.length : firstIdx, 0, t);
  saveAll();
  toast('Moved to top');
}

function moveTask(id, target, before) {
  const t = tasks.find(x => x.id === id); if (!t || t === target) return;
  t.moves = (t.moves || 0) + 1;         // shuffle count: a procrastination signal
  tasks.splice(tasks.indexOf(t), 1);
  let idx = tasks.indexOf(target);
  if (!before) idx++;
  t.col = target.col;
  tasks.splice(idx, 0, t);
  saveAll();
}

function renderBoard() {
  const board = $('board'); board.innerHTML = '';
  cols.forEach(col => {
    const cEl = document.createElement('div'); cEl.className = 'col';
    cEl.dataset.cid = col.id;
    const head = document.createElement('div'); head.className = 'colhead';
    const name = document.createElement('span'); name.className = 'colname'; name.textContent = col.name;
    name.title = 'Click to rename'; name.onclick = () => {
      const v = prompt('Rename list:', col.name);
      if (v && v.trim()) { col.name = v.trim(); saveAll(); }
    };
    const inCol = tasks.filter(t => t.col === col.id);
    const count = document.createElement('span'); count.className = 'colcount'; count.textContent = inCol.length;
    const del = document.createElement('button'); del.className = 'x'; del.textContent = '✕'; del.title = 'Delete list';
    del.onclick = () => {

      const destCol = cols[0].id === col.id ? cols[1] : cols[0];

/* images are downscaled + recompressed so photos fit local storage and stay viewable */
function compressImage(file, maxDim = 1600, quality = 0.82) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { resolve(c.toDataURL('image/jpeg', quality)); } catch { resolve(null); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}
function attachFiles(task, fileList) {
  const files = Array.from(fileList || []); if (!files.length) return;
  touch(task);
  let pending = files.length;
  const doneOne = () => { if (--pending === 0) saveAll(); };
  files.forEach(f => {
    if (/^image\//.test(f.type)) {
      compressImage(f).then(dataUrl => {
        if (dataUrl && dataUrl.length <= 2_000_000)
          task.files.push({ name:f.name, size:f.size, type:'image/jpeg', data:dataUrl });
        else
          task.files.push({ name:f.name, size:f.size, type:f.type });
        doneOne();
      });
    } else if (f.size <= MAX_FILE) {
      const r = new FileReader();
      r.onload = () => { task.files.push({ name:f.name, size:f.size, type:f.type, data:r.result }); doneOne(); };
      r.onerror = () => { task.files.push({ name:f.name, size:f.size, type:f.type }); doneOne(); };
      r.readAsDataURL(f);
    } else {
      task.files.push({ name:f.name, size:f.size, type:f.type });
      doneOne();
    }
  });
}

/* ---- touch drag & drop (mobile: long-press a card, then drag) ---- */
let tDrag = null;
function touchDragInit(li, t) {
  li.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse') return;
    const sx = e.clientX, sy = e.clientY;
    let started = false;
    const timer = setTimeout(() => { started = true; cleanup(); startTouchDrag(li, t, sx, sy); }, 300);
    const move = ev => {
      if (!started && (Math.abs(ev.clientX - sx) > 12 || Math.abs(ev.clientY - sy) > 12)) { clearTimeout(timer); cleanup(); }
    };
    const up = () => { clearTimeout(timer); cleanup(); };
    const cleanup = () => {
      li.removeEventListener('pointermove', move);
      li.removeEventListener('pointerup', up);
      li.removeEventListener('pointercancel', up);
    };
    li.addEventListener('pointermove', move);
    li.addEventListener('pointerup', up);
    li.addEventListener('pointercancel', up);
  });
}
function startTouchDrag(li, t, x, y) {
  if (navigator.vibrate) navigator.vibrate(15);
  const r = li.getBoundingClientRect();
  const ghost = li.cloneNode(true);
  Object.assign(ghost.style, {
    position:'fixed', left:r.left+'px', top:r.top+'px', width:r.width+'px', margin:0,
    zIndex:80, pointerEvents:'none', opacity:.92, transform:'scale(1.04) rotate(1.5deg)',
    boxShadow:'0 16px 40px rgba(0,0,0,.25)', listStyle:'none'

  document.body.appendChild(ghost);

  tDrag = { t, ghost, offX: x - r.left, offY: y - r.top, target:null, before:false, colEl:null };
  const mv = ev => {
    if (ev.cancelable) ev.preventDefault();  // stop page scroll while dragging
    const p = ev.touches ? ev.touches[0] : ev;
    ghost.style.left = (p.clientX - tDrag.offX) + 'px';
    ghost.style.top = (p.clientY - tDrag.offY) + 'px';
    ghost.style.display = 'none';
    const el = document.elementFromPoint(p.clientX, p.clientY);
    ghost.style.display = '';
    clearMarks();
    tDrag.target = null; tDrag.colEl = null;
    const card = el && el.closest ? el.closest('.taskcard') : null;
    if (card && card !== li && !card.classList.contains('dragging')) {
      const cr = card.getBoundingClientRect();
      tDrag.before = (p.clientY - cr.top) < cr.height / 2;
      card.classList.add(tDrag.before ? 'insert-above' : 'insert-below');
      tDrag.target = card;
    } else {
      const colEl = el && el.closest ? el.closest('.col') : null;
      if (colEl) { colEl.classList.add('dragover-col'); tDrag.colEl = colEl; }
    }
    // auto-scroll the board when dragging near its edges
    const board = $('board'), br = board.getBoundingClientRect();
    if (p.clientX > br.right - 44) board.scrollLeft += 14;
    else if (p.clientX < br.left + 44) board.scrollLeft -= 14;
  };
  const end = () => {
    document.removeEventListener('touchmove', mv);
    document.removeEventListener('pointermove', mv);
    document.removeEventListener('pointerup', end);
    document.removeEventListener('pointercancel', end);
    document.removeEventListener('touchend', end);
    ghost.remove(); li.classList.remove('dragging'); clearMarks();
    if (!tDrag) return;
    if (tDrag.target) {
      const targetTask = tasks.find(x => x.id === tDrag.target.dataset.tid);
      if (targetTask) moveTask(t.id, targetTask, tDrag.before);
    } else if (tDrag.colEl) {
      const colId = tDrag.colEl.dataset.cid;
      const tt = tasks.find(x => x.id === t.id);
      if (tt && colId && cols.some(c => c.id === colId)) {
        tasks.splice(tasks.indexOf(tt), 1); tt.col = colId; tasks.push(tt); saveAll();
      }
    }
    tDrag = null;
  };
  document.addEventListener('touchmove', mv, { passive:false });
  document.addEventListener('pointermove', mv);
  document.addEventListener('pointerup', end);
  document.addEventListener('pointercancel', end);
  document.addEventListener('touchend', end);
}

/* duplicate detection */
const norm = s => s.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, '').replace(/\s+/g, ' ').trim();
function similarity(a, b) {
  const A = new Set(norm(a).split(' ')), B = new Set(norm(b).split(' '));
  if (!A.size || !B.size) return 0;
  let inter = 0; A.forEach(w => { if (B.has(w)) inter++; });
  return inter / Math.min(A.size, B.size);
}
function findDup(text) {
  const nt = norm(text);
  return tasks.find(t => {
    const et = norm(t.text);
    return et === nt || et.includes(nt) || nt.includes(et) || similarity(text, t.text) >= 0.7;
  });
}

const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
const STOP = new Set(('the,to,a,an,for,with,on,in,my,and,of,at,from,all,this,that,it,is,are,was,be,by,up,out,into,'
  + 'about,after,before,me,him,her,them,his,its,our,your,their,will,can,need,needs,do,does,did,done,get,got,go,'
  + 'went,come,came,make,made,take,took,give,gave,put,use,used,via,per,when,what,how,then,than,now,not,'
  + 'check,review,write,call,meet,meeting,finish,run,read,reply,ask,pay,test,add,change,listen,play,send,create,'
  + 'update,fix,look,see,watch,buy,clean,plan,book,email,message,talk,going,further,progress,report,today,tomorrow').split(','));
const ALIASES = { mlt: 'minglitang' };   // same project, different names — extend as needed
function tokensOf(text) {
  return norm(text).split(' ')
    .map(w => w.replace(/s$/, ''))
    .map(w => ALIASES[w] || w)
    .filter(w => w.length >= 3 && !STOP.has(w) && !/^\d+$/.test(w) && !/^http/.test(w));
}
function autoCategories() {
  const freq = {};
  tasks.forEach(t => { new Set(tokensOf(t.text)).forEach(w => freq[w] = (freq[w] || 0) + 1); });
  const cats = Object.keys(freq).filter(w => freq[w] >= 2)
    .sort((a, b) => freq[b] - freq[a]).slice(0, 12);
  const groups = {};
  tasks.forEach(t => {
    const tk = tokensOf(t.text);
    let best = null;
    cats.forEach(c => { if (tk.includes(c) && (best === null || freq[c] > freq[best])) best = c; });
    const key = best || 'other';
    const g = groups[key] = groups[key] || { name: key, total: 0, done: 0, time: 0 };
    g.total++; if (t.done) g.done++; g.time += t.timeSpent || 0;
  });
  return Object.values(groups).sort((a, b) => (b.time - a.time) || (b.total - a.total));
}
function bars(items) {

    `<div class="brow"><span class="blabel" title="${esc(i.label)}">${esc(i.label)}</span>` +
    `<div class="btrack"><div class="bfill" style="width:${Math.max(2, Math.round(i.value / max * 100))}%"></div></div>` +
    `<span class="bval">${esc(i.disp ?? i.value)}</span></div>`).join('');
}

  const n = new Date(), dayStart = new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();

  const activeDays = new Set(done.map(t => new Date(t.doneAt).toDateString())).size;
  const wk = done.filter(t => t.doneAt >= dayStart - 6 * 864e5).length;
  const wkPrev = done.filter(t => t.doneAt >= dayStart - 13 * 864e5 && t.doneAt < dayStart - 6 * 864e5).length;
  const trend = wkPrev ? Math.round((wk - wkPrev) / wkPrev * 100) : null;
  const cycles = done.filter(t => t.createdAt).map(t => (t.doneAt - t.createdAt) / 864e5).sort((a, b) => a - b);
  const median = cycles.length ? cycles[Math.floor(cycles.length / 2)] : 0;
